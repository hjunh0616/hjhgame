<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE_SYS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@700;900&display=swap');
:root{--bg:#0d1117;--surface:#161b22;--border:#21262d;--border2:#30363d;--text:#c9d1d9;--dim:#484f58;--mid:#8b949e;--green:#3fb950;--accent:#58a6ff;--red:#f85149;--yellow:#d29922;--purple:#bc8cff}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:16px}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(63,185,80,.015) 2px,rgba(63,185,80,.015) 4px);pointer-events:none}
.topbar{background:var(--surface);border:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;width:100%;max-width:760px;margin-bottom:8px}
.dots{display:flex;gap:5px}
.dot{width:10px;height:10px;border-radius:50%}
.dr{background:#f85149}.dy{background:#d29922}.dg{background:#3fb950}
.tb-title{flex:1;text-align:center;font-size:.65em;color:var(--dim);letter-spacing:.15em}
.main{display:flex;gap:12px;width:100%;max-width:760px}
.left{display:flex;flex-direction:column;gap:8px}
canvas{border:1px solid var(--border2);display:block;background:#000}
.hud{display:flex;gap:8px}
.hud-box{background:var(--surface);border:1px solid var(--border);padding:6px 12px;flex:1;text-align:center}
.hud-label{font-size:.55em;color:var(--dim);letter-spacing:.15em;margin-bottom:2px}
.hud-val{font-size:.9em;font-weight:700;color:var(--green)}
.ctrl-hint{font-size:.6em;color:var(--dim);text-align:center;letter-spacing:.1em}
/* right panel */
.panel{background:var(--surface);border:1px solid var(--border);width:200px;display:flex;flex-direction:column;flex-shrink:0}
.panel-hdr{border-bottom:1px solid var(--border);padding:8px 12px;font-size:.62em;color:var(--dim);letter-spacing:.18em}
.ranking-list{flex:1;overflow:hidden}
.rank-row{display:grid;grid-template-columns:24px 1fr auto;align-items:center;gap:6px;padding:5px 10px;border-bottom:1px solid var(--border);font-size:.65em}
.rank-row:last-child{border-bottom:none}
.rank-num{color:var(--dim);font-size:.85em;text-align:center}
.rank-num.gold{color:#ffd700;font-weight:700}
.rank-num.silver{color:#c0c0c0;font-weight:700}
.rank-num.bronze{color:#cd7f32;font-weight:700}
.rank-name{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-score{color:var(--green);font-weight:700}
.rank-empty{color:var(--dim);font-size:.6em;padding:5px 10px;border-bottom:1px solid var(--border)}
.rank-new{background:rgba(63,185,80,.08);border-left:2px solid var(--green) !important}
/* overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(4px)}
.overlay.hide{display:none}
.modal{background:var(--surface);border:1px solid var(--border2);padding:24px;width:280px;text-align:center}
.modal h2{font-family:'Orbitron',monospace;color:var(--green);font-size:1em;letter-spacing:.2em;margin-bottom:6px}
.modal .score-big{font-size:2em;font-weight:700;color:var(--text);margin:10px 0}
.modal .sub{font-size:.65em;color:var(--dim);margin-bottom:16px;letter-spacing:.1em}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.85em;padding:8px 10px;margin-bottom:10px;outline:none;letter-spacing:.05em}
.modal input:focus{border-color:var(--green)}
.modal .btns{display:flex;gap:8px}
.btn{flex:1;background:transparent;border:1px solid;font-family:'JetBrains Mono',monospace;font-size:.72em;padding:8px;cursor:pointer;letter-spacing:.08em;transition:all .15s}
.btn-ok{border-color:var(--green);color:var(--green)}
.btn-ok:hover{background:rgba(63,185,80,.1)}
.btn-skip{border-color:var(--border2);color:var(--mid)}
.btn-skip:hover{border-color:var(--mid)}
.rank-badge{display:inline-block;padding:2px 8px;border:1px solid var(--yellow);color:var(--yellow);font-size:.62em;letter-spacing:.1em;margin-bottom:8px}
</style>
</head>
<body>
<div class="topbar">
  <div class="dots"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div>
  <div class="tb-title">SNAKE_SYS v3.0 — SURVIVAL PROTOCOL</div>
</div>
<div class="main">
  <div class="left">
    <div class="hud">
      <div class="hud-box"><div class="hud-label">SCORE</div><div class="hud-val" id="sc">0</div></div>
      <div class="hud-box"><div class="hud-label">BEST</div><div class="hud-val" id="hi" style="color:var(--yellow)">0</div></div>
      <div class="hud-box"><div class="hud-label">LEVEL</div><div class="hud-val" id="lv" style="color:var(--accent)">1</div></div>
      <div class="hud-box"><div class="hud-label">LENGTH</div><div class="hud-val" id="ln" style="color:var(--purple)">3</div></div>
    </div>
    <canvas id="c" width="400" height="400"></canvas>
    <div class="ctrl-hint">↑↓←→ MOVE &nbsp;|&nbsp; SPACE START/PAUSE</div>
  </div>
  <div class="panel">
    <div class="panel-hdr">🏆 TOP 10 RANKING</div>
    <div class="ranking-list" id="rankList"></div>
  </div>
</div>

<!-- Game Over Modal -->
<div class="overlay hide" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">GAME OVER</h2>
    <div class="score-big" id="modalScore">0</div>
    <div id="modalBadge"></div>
    <div class="sub" id="modalSub">ENTER YOUR NAME FOR THE RANKING</div>
    <input type="text" id="nameInput" placeholder="NICKNAME" maxlength="10">
    <div class="btns">
      <button class="btn btn-ok" onclick="saveRank()">✓ SAVE</button>
      <button class="btn btn-skip" onclick="skipRank()">SKIP</button>
    </div>
  </div>
</div>

<script>
var STORAGE_KEY = 'snake_ranking_v1';
var SZ=20, COLS=20, ROWS=20;
var snake, dir, nextDir, food, score, level, running, paused, loop;
var ctx = document.getElementById('c').getContext('2d');
var pendingScore = 0;

function getRanking() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
}
function saveRanking(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}
function isTop10(s) {
  var r = getRanking();
  return r.length < 10 || s > r[r.length-1].score;
}
function getRankPos(s) {
  var r = getRanking();
  for(var i=0;i<r.length;i++) { if(s > r[i].score) return i+1; }
  return r.length+1;
}
function addRanking(name, score) {
  var r = getRanking();
  r.push({name: name.toUpperCase()||'ANONYMOUS', score: score});
  r.sort(function(a,b){return b.score-a.score;});
  r = r.slice(0,10);
  saveRanking(r);
  renderRanking(score);
}
function renderRanking(highlight) {
  var r = getRanking();
  var el = document.getElementById('rankList');
  if(r.length === 0) {
    el.innerHTML = '<div class="rank-empty">— NO RECORDS YET —</div>';
    return;
  }
  var medals = ['gold','silver','bronze'];
  el.innerHTML = r.map(function(item,i) {
    var isNew = highlight !== undefined && item.score === highlight;
    return '<div class="rank-row'+(isNew?' rank-new':'')+'">'+
      '<span class="rank-num '+(medals[i]||'')+'">'+(i+1)+'</span>'+
      '<span class="rank-name">'+item.name+'</span>'+
      '<span class="rank-score">'+item.score+'</span>'+
    '</div>';
  }).join('') +
  (r.length < 10 ? Array(10-r.length).fill('<div class="rank-empty">—</div>').join('') : '');
}

function init() {
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  food=newFood(); score=0; level=1;
  document.getElementById('sc').textContent=0;
  document.getElementById('lv').textContent=1;
  document.getElementById('ln').textContent=3;
  var r=getRanking();
  document.getElementById('hi').textContent = r.length>0?r[0].score:0;
}
function newFood() {
  var f;
  do{f={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}
  while(snake.some(function(s){return s.x===f.x&&s.y===f.y;}));
  return f;
}
function draw() {
  ctx.fillStyle='#000';ctx.fillRect(0,0,400,400);
  ctx.strokeStyle='rgba(63,185,80,0.05)';ctx.lineWidth=.5;
  for(var i=0;i<=COLS;i++){ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,400);ctx.stroke();}
  for(var i=0;i<=ROWS;i++){ctx.beginPath();ctx.moveTo(0,i*SZ);ctx.lineTo(400,i*SZ);ctx.stroke();}
  // food
  ctx.shadowColor='#f85149';ctx.shadowBlur=12;
  ctx.fillStyle='#f85149';ctx.fillRect(food.x*SZ+3,food.y*SZ+3,SZ-6,SZ-6);
  ctx.shadowBlur=0;
  // snake
  snake.forEach(function(s,i){
    var t=1-i/snake.length;
    ctx.shadowColor='#3fb950';ctx.shadowBlur=i===0?16:4;
    ctx.fillStyle=i===0?'#3fb950':'rgba(63,'+(Math.floor(185*t))+',80,'+t+')';
    ctx.fillRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2);
    if(i===0){ctx.fillStyle='#000';ctx.fillRect(s.x*SZ+5,s.y*SZ+5,3,3);ctx.fillRect(s.x*SZ+12,s.y*SZ+5,3,3);}
  });
  ctx.shadowBlur=0;
}
function tick() {
  dir = nextDir;
  var head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(function(s){return s.x===head.x&&s.y===head.y;})){
    gameOver(); return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10*level;
    level=Math.floor(score/50)+1;
    document.getElementById('sc').textContent=score;
    document.getElementById('lv').textContent=level;
    document.getElementById('ln').textContent=snake.length;
    food=newFood();
    clearInterval(loop);loop=setInterval(tick,Math.max(60,200-level*15));
  } else { snake.pop(); }
  draw();
}
function gameOver() {
  clearInterval(loop); running=false;
  ctx.fillStyle='rgba(248,81,73,0.12)';ctx.fillRect(0,0,400,400);
  ctx.font='bold 22px Orbitron';ctx.fillStyle='#f85149';ctx.textAlign='center';
  ctx.shadowColor='#f85149';ctx.shadowBlur=16;ctx.fillText('GAME OVER',200,200);ctx.shadowBlur=0;
  pendingScore = score;
  if(score > 0 && isTop10(score)) {
    var pos = getRankPos(score);
    document.getElementById('modalTitle').textContent = 'GAME OVER';
    document.getElementById('modalScore').textContent = score;
    document.getElementById('modalBadge').innerHTML = '<div class="rank-badge">🏆 RANK #'+pos+' ENTRY</div>';
    document.getElementById('modalSub').textContent = 'TOP 10 달성! 닉네임을 입력하세요';
    document.getElementById('nameInput').value='';
    document.getElementById('overlay').classList.remove('hide');
    setTimeout(function(){document.getElementById('nameInput').focus();},100);
  }
}
function saveRank() {
  var name = document.getElementById('nameInput').value.trim() || 'ANONYMOUS';
  addRanking(name, pendingScore);
  document.getElementById('overlay').classList.add('hide');
}
function skipRank() {
  document.getElementById('overlay').classList.add('hide');
}

document.addEventListener('keydown',function(e){
  var map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  if(e.code==='Space'){
    if(!running){init();running=true;paused=false;loop=setInterval(tick,200);draw();}
    else if(paused){paused=false;loop=setInterval(tick,Math.max(60,200-level*15));}
    else{paused=true;clearInterval(loop);}
    e.preventDefault();
  }
  if(map[e.key]&&running&&!paused){
    var d=map[e.key];
    if(!(d.x===-dir.x&&dir.x!==0)||!(d.y===-dir.y&&dir.y!==0)) {
      if(d.x!==-dir.x||d.y!==-dir.y) nextDir=d;
    }
    e.preventDefault();
  }
});
document.getElementById('nameInput').addEventListener('keydown',function(e){
  if(e.key==='Enter') saveRank();
});

// init display
ctx.fillStyle='#000';ctx.fillRect(0,0,400,400);
ctx.font='bold 13px JetBrains Mono';ctx.fillStyle='rgba(63,185,80,0.4)';ctx.textAlign='center';
ctx.fillText('PRESS SPACE TO START',200,200);
renderRanking();
</script>
</body>
</html>
